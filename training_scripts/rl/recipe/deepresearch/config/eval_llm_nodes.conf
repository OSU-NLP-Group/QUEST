# Eval LLM routing config for reward.py (hot-reloaded each call).
# In-flight requests can still finish on the previous node set; use
# LOCAL_OPENAI_TIMEOUT_SECONDS / LOCAL_OPENAI_MAX_RETRIES in the launcher
# to make hot updates take effect faster under node failures.
#
# Backward-compatible legacy mode:
# - One IP per line (below) => treated as [obj] profile IP list.
#
# New sectioned mode (recommended when obj/openended differ):
# [obj]
# ips=a0024,a0022,a0006
# ports=6000,6001,6002,6003
# model=your-obj-model
#
# [openended]
# ips=a0007,a0008
# ports=6000,6001
# model=your-openended-model
#
# You can also use prefixed keys:
# obj_ips=...
# openended_model=...

[obj]
ips=a0013,a0018,a0019,a0022,a0021,a0194,a0243,a0206,a0208,a0237,a0155,a0176
ports=6000,6001,6002,6003
model=eval_model

[openended]
ips=a0013,a0018,a0019,a0021,a0022,a0194,a0243,a0206,a0208,a0237,a0155,a0176
model=eval_model
 
