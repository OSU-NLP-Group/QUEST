# Python sandbox hot-reload config (re-read on every PythonInterpreter call).
# Edit this file at runtime to switch sandbox backends without restart.
#
# Supported formats:
# 1) Explicit endpoints:
#    endpoint=http://a0005:9000/run_code
#    endpoints=http://a0005:9000/run_code,http://a0006:9000/run_code
#
# 2) Hosts x ports Cartesian product:
#    hosts=a0005,a0006
#    ports=9000,9001
#    -> http://a0005:9000/run_code, http://a0005:9001/run_code,
#       http://a0006:9000/run_code, http://a0006:9001/run_code
#
# If this file contains no valid endpoints, the tool falls back to
# SANDBOX_FUSION_ENDPOINT / SANDBOX_FUSION_ENDPOINTS.

hosts=a0011,a0013,a0018,a0019
ports=8080,8081,8082,8083
